# ============================================================
# Netlify Configuration — Monique D. Scott & Associates
# ============================================================

[build]
  # No build command required — site is plain static HTML.
  # Content is served live from Supabase (no JSON index files needed).
  publish = "."

# ── Forms ────────────────────────────────────────────────────
# Netlify auto-detects forms from HTML.
# After first deploy, configure email notifications:
#   Dashboard → Forms → "contact" → Email notification → moniquescottlaw@hotmail.com
#   Dashboard → Forms → "intake"  → Email notification → moniquescottlaw@hotmail.com

# ── Redirects ────────────────────────────────────────────────

# NOTE: /admin and /admin/ are intentionally NOT proxied (status 200) to
# /admin/index.html — doing so caused ERR_TOO_MANY_REDIRECTS because
# Netlify's built-in strip-index-html feature intercepts any internal
# proxy request that resolves to an index.html file and issues a 301
# redirect back to the directory path, which then re-enters the proxy
# rule, creating an infinite loop.
#
# Instead, Netlify's native directory-index serving handles /admin/ →
# /admin/index.html automatically (200, no redirect rule needed).
# The single-hop Pretty URLs redirect /admin → /admin/ is benign.

# /admin/dashboard clean URL → dashboard file (safe: not an index.html)
[[redirects]]
  from   = "/admin/dashboard"
  to     = "/admin/dashboard.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/thank-you"
  to     = "/"
  status = 302

# ── Security Headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Ensure YAML config is served with correct Content-Type
# Required when X-Content-Type-Options: nosniff is set —
# prevents browsers rejecting the file if served as octet-stream.
[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"

# Cache static assets aggressively
[[headers]]
  for = "/assets/vendors/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache JSON indexes (regenerated on every build)
[[headers]]
  for = "/content/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
