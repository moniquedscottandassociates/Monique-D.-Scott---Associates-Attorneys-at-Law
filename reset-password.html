<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Reset Password | Monique D. Scott &amp; Associates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>

<div class="adm-login-wrap">
    <div class="adm-login-card">
        <img src="/assets/images/mds/logo-transparent.png" alt="Monique D. Scott &amp; Associates" class="adm-login-logo">
        <h1>Reset Password</h1>
        <p class="adm-sub">Monique D. Scott &amp; Associates</p>

        <!-- Loading — shown while waiting for the auth state change event -->
        <div id="rp-loading" style="text-align:center; padding:20px 0; color:var(--muted);">
            <i class="fa fa-spinner fa-spin" style="font-size:24px;"></i>
            <p style="margin-top:12px; font-size:13px;">Verifying reset link…</p>
        </div>

        <!-- Shown when the link is invalid or has expired -->
        <div id="rp-invalid" style="display:none;">
            <div class="adm-alert adm-alert--error" style="display:block; margin-bottom:20px;">
                This reset link is invalid or has expired. Please request a new one.
            </div>
            <a href="/admin/" class="adm-btn"><i class="fa fa-arrow-left"></i> Back to Login</a>
        </div>

        <!-- New password form — shown after PASSWORD_RECOVERY event fires -->
        <form id="rp-form" novalidate style="display:none;">
            <div class="adm-field">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" name="new-password"
                       autocomplete="new-password" placeholder="Min. 8 characters"
                       required minlength="8">
            </div>
            <div class="adm-field">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password"
                       autocomplete="new-password" placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="adm-btn" id="rp-btn">
                <i class="fa fa-key"></i> Update Password
            </button>
            <div class="adm-alert adm-alert--error" id="rp-error"></div>
        </form>

        <!-- Success — shown after password is updated -->
        <div id="rp-success" style="display:none;">
            <div class="adm-alert adm-alert--success" style="display:block;">
                <i class="fa fa-check-circle"></i> Password updated. Redirecting to login…
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function () {
    var SUPABASE_URL      = 'https://efvnklokllobqsoripxy.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmdm5rbG9rbGxvYnFzb3JpcHh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODk2MTUsImV4cCI6MjA4OTQ2NTYxNX0.ALq-QLhQqCb2FXciB46FY1wxLc_F5DvL8U5EpW_XOn8';
    var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    var loading = document.getElementById('rp-loading');
    var invalid = document.getElementById('rp-invalid');
    var form    = document.getElementById('rp-form');
    var success = document.getElementById('rp-success');
    var btn     = document.getElementById('rp-btn');
    var errBox  = document.getElementById('rp-error');

    // Supabase JS v2 automatically parses the URL hash on client creation and
    // fires onAuthStateChange with event='PASSWORD_RECOVERY' when a valid
    // recovery token is present. We time out after 4 s to catch expired links.
    var settled = false;

    var timer = setTimeout(function () {
        if (!settled) {
            settled = true;
            loading.style.display = 'none';
            invalid.style.display = 'block';
        }
    }, 4000);

    db.auth.onAuthStateChange(function (event) {
        if (settled) return;
        if (event === 'PASSWORD_RECOVERY') {
            settled = true;
            clearTimeout(timer);
            loading.style.display = 'none';
            form.style.display    = 'block';
        }
    });

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        errBox.style.display = 'none';

        var newPwd     = document.getElementById('new-password').value;
        var confirmPwd = document.getElementById('confirm-password').value;

        if (newPwd.length < 8) {
            errBox.textContent   = 'Password must be at least 8 characters.';
            errBox.style.display = 'block';
            return;
        }
        if (newPwd !== confirmPwd) {
            errBox.textContent   = 'Passwords do not match.';
            errBox.style.display = 'block';
            return;
        }

        btn.disabled  = true;
        btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Updating…';

        db.auth.updateUser({ password: newPwd }).then(function (result) {
            if (result.error) {
                errBox.textContent   = result.error.message || 'Failed to update password.';
                errBox.style.display = 'block';
                btn.disabled  = false;
                btn.innerHTML = '<i class="fa fa-key"></i> Update Password';
            } else {
                form.style.display    = 'none';
                success.style.display = 'block';
                setTimeout(function () {
                    window.location.replace('/admin/');
                }, 2000);
            }
        });
    });
})();
</script>
</body>
</html>
