<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin Login | Monique D. Scott &amp; Associates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/admin/css/admin.css" />
</head>
<body>

<div class="adm-login-wrap">
    <div class="adm-login-card">
        <img src="/assets/images/mds/logo-transparent.png" alt="Monique D. Scott &amp; Associates" class="adm-login-logo">

        <!-- === LOGIN VIEW === -->
        <div id="view-login">
            <h1>Admin Login</h1>
            <p class="adm-sub">Monique D. Scott &amp; Associates</p>

            <form id="login-form" novalidate>
                <div class="adm-field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" autocomplete="username" placeholder="admin@example.com" required>
                </div>
                <div class="adm-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="adm-btn" id="login-btn">
                    <i class="fa fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="adm-alert adm-alert--error" id="login-error"></div>

            <p style="text-align:center; margin-top:18px; font-size:13px;">
                <a href="#" id="show-forgot">Forgot password?</a>
            </p>
        </div>

        <!-- === FORGOT PASSWORD VIEW === -->
        <div id="view-forgot" style="display:none;">
            <h1>Reset Password</h1>
            <p class="adm-sub">Enter your email to receive a reset link</p>

            <form id="forgot-form" novalidate>
                <div class="adm-field">
                    <label for="forgot-email">Email Address</label>
                    <input type="email" id="forgot-email" name="forgot-email" autocomplete="email" placeholder="admin@example.com" required>
                </div>
                <button type="submit" class="adm-btn" id="forgot-btn">
                    <i class="fa fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div class="adm-alert adm-alert--error"   id="forgot-error"></div>
            <div class="adm-alert adm-alert--success" id="forgot-success"></div>

            <p style="text-align:center; margin-top:18px; font-size:13px;">
                <a href="#" id="show-login"><i class="fa fa-arrow-left"></i> Back to login</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function () {
    var SUPABASE_URL      = 'https://efvnklokllobqsoripxy.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmdm5rbG9rbGxvYnFzb3JpcHh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODk2MTUsImV4cCI6MjA4OTQ2NTYxNX0.ALq-QLhQqCb2FXciB46FY1wxLc_F5DvL8U5EpW_XOn8';
    var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already logged in, go straight to dashboard
    db.auth.getSession().then(function (result) {
        if (result.data && result.data.session) {
            window.location.replace('/admin/dashboard.html');
        }
    });

    // ── Login form ────────────────────────────────────────────────────────────
    var loginForm = document.getElementById('login-form');
    var loginBtn  = document.getElementById('login-btn');
    var loginErr  = document.getElementById('login-error');

    loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        loginErr.style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Signing in…';

        var email    = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        db.auth.signInWithPassword({ email: email, password: password })
            .then(function (result) {
                if (result.error) {
                    loginErr.textContent   = result.error.message || 'Invalid email or password.';
                    loginErr.style.display = 'block';
                    loginBtn.disabled      = false;
                    loginBtn.innerHTML     = '<i class="fa fa-sign-in-alt"></i> Sign In';
                } else {
                    window.location.replace('/admin/dashboard.html');
                }
            });
    });

    // ── Forgot password form ──────────────────────────────────────────────────
    var forgotForm    = document.getElementById('forgot-form');
    var forgotBtn     = document.getElementById('forgot-btn');
    var forgotErr     = document.getElementById('forgot-error');
    var forgotSuccess = document.getElementById('forgot-success');

    forgotForm.addEventListener('submit', function (e) {
        e.preventDefault();
        forgotErr.style.display     = 'none';
        forgotSuccess.style.display = 'none';
        forgotBtn.disabled  = true;
        forgotBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Sending…';

        var email = document.getElementById('forgot-email').value.trim();

        db.auth.resetPasswordForEmail(email, {
            redirectTo: 'https://moniquedscottandassociates.com/reset-password.html'
        }).then(function (result) {
            forgotBtn.disabled  = false;
            forgotBtn.innerHTML = '<i class="fa fa-paper-plane"></i> Send Reset Link';
            if (result.error) {
                forgotErr.textContent   = result.error.message || 'Failed to send reset email.';
                forgotErr.style.display = 'block';
            } else {
                forgotSuccess.textContent   = 'Check your email for a password reset link.';
                forgotSuccess.style.display = 'block';
                forgotForm.reset();
            }
        });
    });

    // ── View toggles ──────────────────────────────────────────────────────────
    document.getElementById('show-forgot').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('view-login').style.display  = 'none';
        document.getElementById('view-forgot').style.display = 'block';
        forgotErr.style.display     = 'none';
        forgotSuccess.style.display = 'none';
    });

    document.getElementById('show-login').addEventListener('click', function (e) {
        e.preventDefault();
        document.getElementById('view-forgot').style.display = 'none';
        document.getElementById('view-login').style.display  = 'block';
        loginErr.style.display = 'none';
    });
})();
</script>
</body>
</html>
